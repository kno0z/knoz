<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>كنوز - تسوق الآن</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F0FF 100%);
            min-height: 100vh;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 30px;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            flex-wrap: wrap;
        }

        /* ===== ad-left 160x300 ===== */
        .ad-left {
            width: 160px;
            height: 300px;
            flex-shrink: 0;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 16px;
            background: #f8f9fa;
            border: 1px solid #eee;
        }

        .ad-left iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .ad-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.9rem;
            flex-direction: column;
            gap: 10px;
        }

        .ad-placeholder i {
            font-size: 2.5rem;
            color: #ccc;
        }

        /* ===== container ===== */
        .container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            flex: 1;
        }

        /* ===== logo ===== */
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1A1A2E;
            margin-bottom: 1.5rem;
        }

        .logo i {
            color: #FF6B8A;
            margin-left: 12px;
        }

        .logo span {
            background: linear-gradient(135deg, #FF6B8A, #A855F7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== motivation ===== */
        .motivation {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }

        .motivation i {
            color: #FFD700;
            margin: 0 8px;
        }

        .sub-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        /* ===== btn-shop ===== */
        .btn-shop {
            background: linear-gradient(135deg, #4A8DFF, #A855F7);
            color: white;
            padding: 20px 65px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.4rem;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 6px 35px rgba(74, 141, 255, 0.35);
            text-decoration: none;
            animation: pulse-btn 2.5s infinite;
            margin-top: 0.3rem;
        }

        .btn-shop:hover {
            transform: scale(1.06);
            box-shadow: 0 8px 50px rgba(74, 141, 255, 0.5);
        }

        @keyframes pulse-btn {
            0%,
            100% {
                box-shadow: 0 6px 35px rgba(74, 141, 255, 0.35);
            }
            50% {
                box-shadow: 0 6px 55px rgba(168, 85, 247, 0.5);
            }
        }

        /* ===== arrow ===== */
        .arrow-down {
            font-size: 2.5rem;
            color: #A855F7;
            animation: bounce-arrow 1.8s infinite;
            margin: 0.3rem 0;
        }

        @keyframes bounce-arrow {
            0%,
            100% {
                transform: translateY(0);
                opacity: 1;
            }
            50% {
                transform: translateY(12px);
                opacity: 0.5;
            }
        }

        /* ===== ad-right 300x250 ===== */
        .ad-right {
            width: 300px;
            height: 250px;
            flex-shrink: 0;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 16px;
            background: #f8f9fa;
            border: 1px solid #eee;
        }

        .ad-right iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ===== الإعلانات للجوال (مصغرة) ===== */
        .ads-mobile {
            display: none;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .ads-mobile .ad-mobile-item {
            flex: 0 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #f8f9fa;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ads-mobile .ad-mobile-item iframe {
            border: none;
            display: block;
        }

        /* إعلان 160x300 مصغر للجوال */
        .ad-mobile-left {
            width: 120px;
            height: 220px;
        }

        .ad-mobile-left iframe {
            width: 120px;
            height: 220px;
        }

        /* إعلان 300x250 مصغر للجوال */
        .ad-mobile-right {
            width: 200px;
            height: 170px;
        }

        .ad-mobile-right iframe {
            width: 200px;
            height: 170px;
        }

        .ad-mobile-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.7rem;
            flex-direction: column;
            gap: 6px;
            padding: 5px;
            text-align: center;
        }

        .ad-mobile-placeholder i {
            font-size: 1.8rem;
            color: #ccc;
        }

        /* ===== responsive ===== */
        @media (max-width: 992px) {
            .ad-left {
                display: none;
            }
            .ad-right {
                display: none;
            }
            .ads-mobile {
                display: flex;
            }
            .page-wrapper {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .ads-mobile {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .ad-mobile-left {
                width: 160px;
                height: 300px;
            }

            .ad-mobile-left iframe {
                width: 160px;
                height: 300px;
            }

            .ad-mobile-right {
                width: 300px;
                height: 250px;
            }

            .ad-mobile-right iframe {
                width: 300px;
                height: 250px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding-top: 10px;
            }

            .page-wrapper {
                padding-top: 10px;
                padding-left: 10px;
                padding-right: 10px;
            }

            .logo {
                font-size: 2rem;
                margin-bottom: 1rem;
            }

            .motivation {
                font-size: 1.6rem;
            }

            .sub-text {
                font-size: 1rem;
                margin-bottom: 1rem;
            }

            .btn-shop {
                padding: 16px 40px;
                font-size: 1.1rem;
            }

            .arrow-down {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <!-- ===== الإعلان الأيسر 160x300 (سطح المكتب) ===== -->
        <div class="ad-left" id="ad-left-container">

            <div class="motivation">

            <p class="sub-text">

                <i class="fas fa-gem" style="color: #FF6B8A;"></i>
            </p>

            <!-- ===== سهم متحرك ===== -->
            <div class="arrow-down">

            </div>

            <!-- ===== زر التسوق ===== -->
            <a href="https://rolemall.com/wC6ofFAshop" target="_blank" class="btn-shop">

        </div>

        <!-- ===== الإعلان الأيمن 300x250 (سطح المكتب) ===== -->
        <div class="ad-right" id="ad-right-container">

                    <i class="fas fa-ad"></i>
                    <span>جاري تحميل الإعلان...</span>

                </div>
            </div>

                        adContainer.appendChild(script1);

                        var script2 = document.createElement('script');
                        script2.src = 'https://www.highperformanceformat.com/a7e1a22928a6e19067a8fde104484e86/invoke.js';
                        adContainer.appendChild(script2);
                    }
                })();
            </script>
        </div>

    </div>

    <!-- ===== الإعلانات للجوال (مصغرة) ===== -->
    <div class="ads-mobile">

        <!-- إعلان 160x300 مصغر -->
        <div class="ad-mobile-item ad-mobile-left" id="ad-mobile-left">
            <div class="ad-mobile-placeholder">
                <i class="fas fa-ad"></i>
                <span>إعلان</span>
                <span style="font-size:0.6rem;color:#ccc;">160x300</span>
            </div>
        </div>

        <!-- إعلان 300x250 مصغر -->
        <div class="ad-mobile-item ad-mobile-right" id="ad-mobile-right">
            <div class="ad-mobile-placeholder">
                <i class="fas fa-ad"></i>
                <span>إعلان</span>

        })();
    </script>

</body>
</html>
